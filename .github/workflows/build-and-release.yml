name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_name:
        description: 'Release name (optional)'
        required: false
        type: string

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds
          - os: windows-latest
            target: win-x64
            rid: win-x64
            artifact_suffix: .exe
          - os: windows-latest
            target: win-x86
            rid: win-x86
            artifact_suffix: .exe
          - os: windows-latest
            target: win-arm64
            rid: win-arm64
            artifact_suffix: .exe
          
          # Linux builds
          - os: ubuntu-latest
            target: linux-x64
            rid: linux-x64
            artifact_suffix: ''
          - os: ubuntu-latest
            target: linux-arm
            rid: linux-arm
            artifact_suffix: ''
          - os: ubuntu-latest
            target: linux-arm64
            rid: linux-arm64
            artifact_suffix: ''
          - os: ubuntu-latest
            target: linux-musl-x64
            rid: linux-musl-x64
            artifact_suffix: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build NotDnsTTClient - ${{ matrix.target }}
        run: |
          dotnet publish NotDnsTTClient/NotDnsTTClient.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained `
            --output ./publish/NotDnsTTClient/${{ matrix.target }} `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:PublishReadyToRun=true

      - name: Build NotDnsTTServer - ${{ matrix.target }}
        run: |
          dotnet publish NotDnsTTServer/NotDnsTTServer.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained `
            --output ./publish/NotDnsTTServer/${{ matrix.target }} `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=true `
            -p:PublishReadyToRun=true

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Package NotDnsTTClient - ${{ matrix.target }}
        shell: bash
        run: |
          cd publish/NotDnsTTClient/${{ matrix.target }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a -tzip ../../../artifacts/NotDnsTTClient-${{ matrix.target }}.zip .
          else
            tar -czf ../../../artifacts/NotDnsTTClient-${{ matrix.target }}.tar.gz .
          fi

      - name: Package NotDnsTTServer - ${{ matrix.target }}
        shell: bash
        run: |
          cd publish/NotDnsTTServer/${{ matrix.target }}
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            7z a -tzip ../../../artifacts/NotDnsTTServer-${{ matrix.target }}.zip .
          else
            tar -czf ../../../artifacts/NotDnsTTServer-${{ matrix.target }}.tar.gz .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-artifacts
          path: artifacts/
          retention-days: 30

  create-release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p final-artifacts
          find release-artifacts -type f -name "*.zip" -o -name "*.tar.gz" | while read file; do
            cp "$file" final-artifacts/
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: final-artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
          body: |
            ## NotDnsTT Release ${{ github.ref_name }}

            ### Platforms Included
            
            **Windows (Multiple Architectures)**
            - NotDnsTTClient-win-x64.zip
            - NotDnsTTClient-win-x86.zip
            - NotDnsTTClient-win-arm64.zip
            - NotDnsTTServer-win-x64.zip
            - NotDnsTTServer-win-x86.zip
            - NotDnsTTServer-win-arm64.zip

            **Linux (Multiple Architectures)**
            - NotDnsTTClient-linux-x64.tar.gz
            - NotDnsTTClient-linux-arm.tar.gz
            - NotDnsTTClient-linux-arm64.tar.gz
            - NotDnsTTClient-linux-musl-x64.tar.gz
            - NotDnsTTServer-linux-x64.tar.gz
            - NotDnsTTServer-linux-arm.tar.gz
            - NotDnsTTServer-linux-arm64.tar.gz
            - NotDnsTTServer-linux-musl-x64.tar.gz

            ### Configuration
            Before running, configure your settings in the `launchSettings.json` file or via command-line arguments:
            - Encryption key
            - DNS server address
            - Domain names
            - Port numbers

            See [CONFIGURATION.md](https://github.com/${{ github.repository }}/blob/main/CONFIGURATION.md) for detailed setup instructions.

            ### Security Notice
            ⚠️ This tool implements covert communication channels. Ensure all usage complies with applicable laws and organizational policies.

            ---
            Built with .NET 8.0 on GitHub Actions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-status:
    name: Build Status
    runs-on: ubuntu-latest
    needs: build
    if: always()
    
    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ All builds completed successfully!"
            exit 0
          else
            echo "❌ Build failed!"
            exit 1
          fi
